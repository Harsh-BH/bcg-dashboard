services:
  - type: web
    name: bcg-dashboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://bcg-dashboard-pied.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
